// file: main.ms
function()
init = function()
  gameover = 0
  running = 0
  blades = [200,300,400]
  passed = [0,0,0]
  score = 0
  position = 0
  speed = 2
  hero_y = 0
  hero_vy = 0
end

update = function()
  
  // ===== GAME OVER =====
  if gameover then
    if keyboard.ENTER then init() end
    return
  end
  
  // ===== SPIEL LÄUFT =====
  if running then
    
    position += speed
  

    // Springen
    if keyboard.SPACE and hero_y == 0 then
       hero_vy = 7
       audio.beep("square tempo 20000 volume 10 span 100 C4 to C6")
    end

    hero_vy -= 0.3
    hero_y = max(0, hero_y + hero_vy)

    for i=0 to blades.length-1
      
      if blades[i] < position-120 then
        blades[i] = position+280+random.next()*200
        passed[i] = 0
      end

      if abs(position-blades[i]) < 10 then
        
        if hero_y < 10 then
          running = 0
          gameover = 1
          audio.beep("saw tempo 10000 volume 50 span 50 C2 to C4 to C2 to C4")
        
        elsif not passed[i] then
          passed[i] = 1
          score += 1
          // Alle 10 Punkte schneller
          if score % 10 == 0 then
            speed += 0.5
            audio.beep("square tempo 800 volume 40 span 40 C5")
          end
          audio.beep("saw tempo 960 volume 50 span 20 C6")
        end
        
      end
    end
  
  // ===== START MENÜ =====
  else
    if keyboard.SPACE then
      running = 1
    end
  end
end


draw = function()
  
  screen.fillRect(0,0,screen.width,screen.height,"rgb(135,206,235)")

  for i=-6 to 6 by 1
    screen.drawSprite("wall", i*40-position%40, -78, 40)
  end

  screen.drawSprite("hero", -80, -60+hero_y, 70)

  for i=0 to blades.length-1
    screen.drawSprite("poop", blades[i]-position-80, -85, 20)
  end

  // ===== SCORE IM SPIEL =====
  if running then
    screen.drawText("Score: " + score, 110, 90, 25, "#000")
  end

  // ===== GAME OVER =====
  if gameover then
    screen.fillRect(0,0,screen.width,screen.height,"rgba(0,0,0,.6)")
    screen.drawText("GAME OVER", 0, -10, 50, "#FFF")
    screen.drawText("Score: " + score, 0, 40, 30, "#FFF")
    screen.drawText("ENTER = Restart", 0, 80, 20, "#FFF")
  
  // ===== START SCREEN =====
  elsif not running then
    screen.drawText("READY?", 0, 10, 50, "#FFF")
    screen.drawText("SPACE = Start & Jump", 0, 70, 20, "#FFF")
  end

end

init()
end()
